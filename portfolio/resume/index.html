<html>
<head>
    <title> My Resume</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@400;500;600&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .about-hero {
            padding: 60px 0 56px;
            border-bottom: 3px solid #000;
            margin-bottom: 60px;
        }
        .about-hero h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 900;
            font-size: clamp(52px, 7vw, 88px);
            line-height: 1.0;
            letter-spacing: -0.03em;
            margin: 0 0 8px;
            color: #000;
        }
        .about-hero h1 em {
            font-style: italic;
        }
        .about-intro {
            font-family: 'Libre Baskerville', serif;
            font-size: 18px;
            line-height: 1.7;
            color: var(--black);
            margin: 0 0 12px;
            max-width: 780px;
        }
        .about-intro a {
            color: var(--black);
            font-weight: 700;
            text-decoration: none;
            border-bottom: 1.5px solid var(--crimson);
            padding-bottom: 1px;
            transition: color 0.2s;
        }
        .about-intro a:hover { color: var(--crimson); }
        .about-intro em { font-style: italic; }
        .resume-btn {
            display: inline-block;
            margin: 20px 0 0;
            font-family: 'Montserrat', sans-serif;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--white);
            background: var(--black);
            text-decoration: none;
            padding: 12px 24px;
            transition: background 0.2s;
        }
        .resume-btn:hover { background: var(--crimson); }
        .about-body {
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 80px;
            align-items: start;
        }
        .about-photo {
            width: 100%;
            max-width: 360px;
            height: 440px;
            object-fit: cover;
            object-position: center top;
            display: block;
            margin-bottom: 40px;
        }
        .section-label {
            font-family: 'Montserrat', sans-serif;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--black);
            display: block;
            padding-bottom: 12px;
            border-bottom: 2px solid #000;
            margin: 0 0 24px;
        }
        .interviews-block {
            margin-bottom: 56px;
        }
        .interviews-block p {
            font-family: 'Libre Baskerville', serif;
            font-size: 16px;
            line-height: 1.85;
            color: var(--black);
            margin: 0;
        }
        .interviews-block a {
            color: var(--black);
            font-weight: 700;
            text-decoration: none;
            border-bottom: 1.5px solid var(--crimson);
            padding-bottom: 1px;
            transition: color 0.2s;
        }
        .interviews-block a:hover { color: var(--crimson); }
        .exp-block {
            margin-bottom: 56px;
        }
        .exp-item {
            display: flex;
            justify-content: space-between;
            align-items: start;
            padding: 16px 0;
            border-bottom: 1px solid var(--gray-light);
        }
        .exp-item:last-child { border-bottom: none; }
        .exp-left { flex: 1; }
        .exp-org {
            font-family: 'Libre Baskerville', serif;
            font-weight: 700;
            font-size: 15px;
            color: var(--black);
            margin: 0 0 4px;
            text-decoration: none;
            display: block;
        }
        a.exp-org:hover { color: var(--crimson); }
        .exp-role {
            font-family: 'Libre Baskerville', serif;
            font-style: italic;
            font-size: 14px;
            color: var(--gray-dark);
            margin: 0 0 2px;
        }
        .exp-date {
            font-family: 'Montserrat', sans-serif;
            font-size: 9px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gray-mid);
            white-space: nowrap;
            padding-top: 4px;
        }
        .skills-block {
            margin-bottom: 56px;
        }
        .skills-list {
            font-family: 'Libre Baskerville', serif;
            font-size: 15px;
            line-height: 1.85;
            color: var(--black);
            margin: 0;
        }
        .awards-block { margin-bottom: 56px; }
        .award-item {
            display: flex;
            justify-content: space-between;
            align-items: start;
            padding: 16px 0;
            border-bottom: 1px solid var(--gray-light);
        }
        .award-item:last-child { border-bottom: none; }
        .award-name {
            font-family: 'Libre Baskerville', serif;
            font-size: 15px;
            color: var(--black);
            margin: 0;
        }
        .award-name strong { font-weight: 700; }
        .award-year {
            font-family: 'Montserrat', sans-serif;
            font-size: 9px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gray-mid);
            white-space: nowrap;
            padding-top: 4px;
        }
        .contact-panel {
            position: sticky;
            top: 90px;
        }
        .contact-block {
            border-top: 2px solid #000;
            padding-top: 16px;
            margin-bottom: 40px;
        }
        .contact-block-label {
            font-family: 'Montserrat', sans-serif;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--black);
            margin: 0 0 20px;
        }
        .contact-item {
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--gray-light);
        }
        .contact-item:last-child { border-bottom: none; }
        .contact-item-label {
            font-family: 'Montserrat', sans-serif;
            font-size: 8px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--gray-mid);
            margin: 0 0 4px;
            display: block;
        }
        .contact-item-value {
            font-family: 'Libre Baskerville', serif;
            font-size: 13px;
            color: var(--black);
            margin: 0;
        }
        .contact-item-value a {
            color: var(--black);
            text-decoration: none;
            border-bottom: 1px solid var(--gray-light);
            transition: color 0.2s;
        }
        .contact-item-value a:hover { color: var(--crimson); }
        @media (max-width: 820px) {
            .about-body { grid-template-columns: 1fr; gap: 40px; }
            .contact-panel { position: static; }
        }
    </style>
